name: Policy Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate PR branch naming
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          branch="${{ github.head_ref }}"
          if [[ "$branch" =~ ^(feature|hotfix|bugfix)/ ]]; then
            echo "PR branch is valid: $branch"
          else
            echo "Invalid PR branch: $branch"
            echo "Use feature/*, hotfix/*, or bugfix/*"
            exit 1
          fi

      - name: Run repository policy checks
        run: python scripts/policy_check.py --stage ci --skip-branch-check
