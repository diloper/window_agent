name: Policy Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: policy-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch pull request base ref
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run repository policy checks (pull request)
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/policy_check.py --stage ci
          --branch "${{ github.head_ref }}"
          --base "origin/${{ github.base_ref }}"

      - name: Run repository policy checks (push)
        if: github.event_name != 'pull_request'
        run: python scripts/policy_check.py --stage ci --skip-branch-check --base HEAD~1
